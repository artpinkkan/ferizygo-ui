<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Ferries — FerizyGo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-wrapper">

    <!-- Left panel: branding -->
    <div class="brand-panel">
      <div class="brand-content">
        <div class="brand-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 32 Q12 20 24 22 Q36 24 44 16" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
            <rect x="10" y="22" width="28" height="10" rx="2" fill="white" opacity="0.9"/>
            <rect x="14" y="16" width="16" height="8" rx="2" fill="white" opacity="0.7"/>
            <rect x="6" y="32" width="36" height="4" rx="2" fill="white" opacity="0.5"/>
            <circle cx="14" cy="36" r="3" fill="white"/>
            <circle cx="34" cy="36" r="3" fill="white"/>
          </svg>
          <span class="brand-name">FerizyGo</span>
        </div>
        <h1 class="brand-tagline">Find Your<br/>Route</h1>
        <p class="brand-desc">Search hundreds of ferry routes across Indonesian waters and book your tickets instantly.</p>
        <div class="brand-features">
          <div class="feature-item">
            <span class="feature-icon">⚓</span>
            <span>100+ Routes Nationwide</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">🎫</span>
            <span>Instant E-Ticket</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">🔒</span>
            <span>Secure &amp; Trusted</span>
          </div>
        </div>
      </div>
      <div class="wave-bottom">
        <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,60 C360,120 1080,0 1440,60 L1440,120 L0,120 Z" fill="white"/>
        </svg>
      </div>
    </div>

    <!-- Right panel: form -->
    <div class="form-panel">
      <div class="form-card">
        <div class="form-inner">

          <div class="form-header">
            <h2>Search Ferry Tickets</h2>
            <p>Choose your route and travel details</p>
          </div>

          <form id="searchForm" novalidate>

            <!-- From / To ports -->
            <div class="field-row">
              <!-- From Port -->
              <div class="field-group">
                <label for="fromPort">From Port</label>
                <div class="input-wrapper">
                  <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
                    </svg>
                  </span>
                  <select id="fromPort" name="fromPort">
                    <option value="" disabled selected>Select port</option>
                    <option value="merak">Merak</option>
                    <option value="bakauheni">Bakauheni</option>
                    <option value="ketapang">Ketapang</option>
                    <option value="gilimanuk">Gilimanuk</option>
                    <option value="padangbai">Padangbai</option>
                    <option value="lembar">Lembar</option>
                  </select>
                  <span class="select-arrow">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="6 9 12 15 18 9"/>
                    </svg>
                  </span>
                </div>
                <span class="error-msg" id="fromPortError"></span>
              </div>

              <!-- To Port -->
              <div class="field-group">
                <label for="toPort">To Port</label>
                <div class="input-wrapper">
                  <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
                    </svg>
                  </span>
                  <select id="toPort" name="toPort">
                    <option value="" disabled selected>Select port</option>
                    <option value="merak">Merak</option>
                    <option value="bakauheni">Bakauheni</option>
                    <option value="ketapang">Ketapang</option>
                    <option value="gilimanuk">Gilimanuk</option>
                    <option value="padangbai">Padangbai</option>
                    <option value="lembar">Lembar</option>
                  </select>
                  <span class="select-arrow">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="6 9 12 15 18 9"/>
                    </svg>
                  </span>
                </div>
                <span class="error-msg" id="toPortError"></span>
              </div>
            </div>

            <!-- Departure Date -->
            <div class="field-group">
              <label for="departureDate">Departure Date</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                  </svg>
                </span>
                <input
                  type="date"
                  id="departureDate"
                  name="departureDate"
                />
              </div>
              <span class="error-msg" id="departureDateError"></span>
            </div>

            <!-- Passengers -->
            <div class="field-group">
              <label>Passengers (Adult)</label>
              <div class="counter-wrapper">
                <button type="button" class="counter-btn" id="passengerMinus" aria-label="Decrease passengers">−</button>
                <span class="counter-value" id="passengerCount" aria-live="polite">1</span>
                <button type="button" class="counter-btn" id="passengerPlus" aria-label="Increase passengers">+</button>
              </div>
              <input type="hidden" id="passengers" name="passengers" value="1" />
              <span class="error-msg" id="passengersError"></span>
            </div>

            <!-- Vehicle Type -->
            <div class="field-group">
              <label for="vehicleType">Vehicle Type</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
                  </svg>
                </span>
                <select id="vehicleType" name="vehicleType">
                  <option value="" disabled selected>Select vehicle type</option>
                  <option value="none">No Vehicle</option>
                  <option value="motorcycle">Motorcycle</option>
                  <option value="car">Car</option>
                  <option value="bus">Bus</option>
                  <option value="truck">Truck</option>
                </select>
                <span class="select-arrow">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </span>
              </div>
              <span class="error-msg" id="vehicleTypeError"></span>
            </div>

            <button type="submit" class="btn-register" id="searchBtn">
              <span class="btn-text">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                Search Ferry
              </span>
              <span class="btn-loader" hidden>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                </svg>
              </span>
            </button>

          </form>

          <div class="form-footer">
            <p>Already have a ticket? <a href="login.html" class="link">Login</a></p>
          </div>

        </div>
      </div>
    </div>

  </div>

  <script src="search.js"></script>
</body>
</html>
